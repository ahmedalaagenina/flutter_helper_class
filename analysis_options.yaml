# please see README.md for setup instructions
# dev_dependencies:
#   g_lints:
#     git:
#       url: https://github.com/ahmedalaagenina/g_lints.git
#       ref: main

include: package:g_lints/baseline.yaml

analyzer:
  errors:
    # --- Graduated rules (zero violations here — keep it that way) ---
    avoid_print: error # Use logger or debugPrint instead of print().
    use_build_context_synchronously: warning # Prevents app crash when using context after 'await'.
    unrelated_type_equality_checks: warning # Prevents comparing different types (e.g., String == int).
    collection_methods_unrelated_type: warning # Prevents searching for wrong types in lists.
    hash_and_equals: warning # Overriding == requires overriding hashCode too.
    test_types_in_equals: warning # Ensure runtime type checks inside == overrides.
    no_duplicate_case_values: warning # Prevents duplicate cases in switch statements.
    empty_catches: warning # Prevents silent errors. Add a comment inside catch if intentional.
    control_flow_in_finally: warning # Prevents return/break inside finally, which hides exceptions.
    throw_in_finally: warning # Prevents throwing new errors in finally, which masks original errors.
    only_throw_errors: warning # Throw Exceptions/Errors, not plain Strings.
    await_only_futures: warning # Prevents awaiting non-Futures (usually missing '()' on a function call).
    no_logic_in_create_state: warning # createState should only instantiate the state class.
    unnecessary_statements: warning # Prevents useless statements like 'a == b;' instead of 'a = b;'.
    no_adjacent_strings_in_list: warning # Prevents missing commas in lists like ['a' 'b'].
    literal_only_boolean_expressions: warning # Prevents hardcoded conditions like 'if (true)'.
    avoid_type_to_string: warning # Prevents runtimeType.toString() as it breaks in release mode.
    depend_on_referenced_packages: warning # declare bloc, http, mime, path, timezone in pubspec.yaml
    deprecated_member_use: warning # migrate deprecated Flutter APIs (dart fix --apply clears ~309)


    # --- WAITING ROOM: promote each to warning when its count reaches 0. ---
    # unawaited_futures: warning             # 74 left — await it, or wrap in unawaited() if fire-and-forget is intended
    # avoid_dynamic_calls: warning           # 125 left — replace raw JSON access with typed models, endpoint by endpoint
