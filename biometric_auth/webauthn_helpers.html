<script>
  /**
   * Returns true if the browser supports WebAuthn and has a
   * platform authenticator available (Windows Hello, Touch ID, Face ID,
   * Android biometric, or device PIN as fallback).
   */
  window.webAuthnIsAvailable = async function () {
    try {
      if (!window.PublicKeyCredential) return false;
      return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    } catch (e) {
      return false;
    }
  };

  /**
   * Prompts the user for biometric or device credential via WebAuthn.
   *
   * NOTE: This uses a "get" (assertion) flow with an empty allowCredentials list,
   * which triggers the platform authenticator UI without requiring a prior
   * registration step. The browser will ask for fingerprint, Face ID, Windows
   * Hello, or device PIN depending on what is available.
   *
   * For full security in production, the challenge should come from your server.
   */
  window.webAuthnAuthenticate = async function (challenge) {
    try {
      const encoder = new TextEncoder();
      const challengeBuffer = encoder.encode(challenge);

      const credential = await navigator.credentials.get({
        publicKey: {
          challenge: challengeBuffer,
          timeout: 60000,
          // "preferred" = use biometric if available, fall back to device PIN
          userVerification: "preferred",
          rpId: window.location.hostname,
          // Empty = any registered credential, or just triggers platform UI
          allowCredentials: [],
        },
      });

      return credential !== null;
    } catch (e) {
      // Re-throw so Dart can catch it and read the error name
      throw e.toString();
    }
  };
</script>
